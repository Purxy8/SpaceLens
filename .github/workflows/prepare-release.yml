name: Prepare verified release inputs

on:
  workflow_dispatch:
    inputs:
      expected_source_sha:
        description: Exact reviewed 40-character main commit SHA
        required: true
        type: string
      release_notes:
        description: Short update text displayed inside SpaceLens (maximum 4000 characters)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: prepare-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-prepare:
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'Purxy8/SpaceLens' && github.ref == 'refs/heads/main' && github.actor == github.repository_owner && github.triggering_actor == github.repository_owner }}
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.301

      - name: Resolve strict release version
        id: metadata
        shell: pwsh
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
        run: |
          if ($env:EXPECTED_SOURCE_SHA -notmatch '^[0-9A-Fa-f]{40}$' -or
              -not [string]::Equals($env:EXPECTED_SOURCE_SHA, $env:GITHUB_SHA, [StringComparison]::OrdinalIgnoreCase)) {
            throw 'The dispatched source commit does not match the exact reviewed main commit.'
          }
          [xml]$properties = Get-Content -Raw -LiteralPath .\Directory.Build.props
          $nodes = @($properties.SelectNodes('/Project/PropertyGroup/SpaceLensVersion'))
          if ($nodes.Count -ne 1) { throw 'Directory.Build.props must contain exactly one SpaceLensVersion element.' }
          $version = $nodes[0].InnerText.Trim()
          if ($version -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$') { throw 'SpaceLensVersion is not strict semantic version text.' }
          "version=$version" | Out-File -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build, self-test, and seal release inputs
        shell: pwsh
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES) -or $env:RELEASE_NOTES.Length -gt 4000) {
            throw 'Release notes must contain between 1 and 4000 characters.'
          }
          .\scripts\Build-Release.ps1 -PrepareOfflineRelease -Notes $env:RELEASE_NOTES

      - name: Upload exact prepared release ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SpaceLens-ReleaseInput-${{ steps.metadata.outputs.version }}-${{ github.sha }}
          path: artifacts/intermediate/SpaceLens-release-input-v${{ steps.metadata.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Upload prepared ZIP SHA-256 separately
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SpaceLens-ReleaseInput-SHA256-${{ steps.metadata.outputs.version }}-${{ github.sha }}
          path: artifacts/intermediate/SpaceLens-release-input-v${{ steps.metadata.outputs.version }}.zip.sha256
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: false
          include-hidden-files: false
