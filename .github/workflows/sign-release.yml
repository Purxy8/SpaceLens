name: SignPath release unavailable

on:
  workflow_dispatch:

permissions: {}

jobs:
  unavailable:
    # SECURITY LOCK: the former single-job design mixed execution of repository-
    # built product bytes with later secret access. It is retired, not toggleable.
    # A future workflow requires separately audited no-secret build, secret-only
    # signing, and fresh no-secret validation jobs with digest-bound handoffs.
    if: ${{ false }}
    runs-on: windows-latest
    steps:
      - name: Signing design is intentionally unavailable
        shell: pwsh
        run: throw 'SignPath signing remains unavailable pending a separately audited split-job design.'
